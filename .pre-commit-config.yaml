repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: node
        files: \.(js|ts|vue)?$
        entry: pnpm lint
        args: [--no-warn-ignored]

  - repo: https://github.com/Riverside-Healthcare/djLint
    rev: v1.36.4
    hooks:
      - id: djlint-reformat-django
      - id: djlint-django
  - repo: local
    hooks:
      - id: django-blocktrans-trimmed
        name: Ensure blocktrans/blocktranslate use trimmed
        language: python
        entry: scripts/enforce_blocktrans_trimmed.py
        files: \.html$
